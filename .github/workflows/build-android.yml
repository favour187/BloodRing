# ──────────────────────────────────────────────────────────────────────
#  Blood Ring — Android APK Build Pipeline
#  Manual trigger only — requires Unity license
# ──────────────────────────────────────────────────────────────────────
name: Build — Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      unity_version:
        description: 'Unity version'
        required: true
        default: '2022.3.50f1'
        type: string

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: ${{ inputs.unity_version }}
          buildName: BloodRingApex.apk
          buildsPath: build/Android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloodRing-Android-${{ inputs.build_type }}-${{ github.sha }}
          path: '**/*.apk'
          retention-days: 30
