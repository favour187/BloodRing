# ──────────────────────────────────────────────────────────────────────
#  Blood Ring — Android APK Build Pipeline
# ──────────────────────────────────────────────────────────────────────
name: Build — Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      unity_version:
        description: 'Unity version'
        required: true
        default: '2022.3.50f1'
        type: string

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: ${{ inputs.unity_version }}
          buildName: BloodRingApex
          buildsPath: build/Android

          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.UNITY_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.UNITY_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.UNITY_KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.UNITY_KEY_PASS }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BloodRing-Android-${{ inputs.build_type }}-${{ github.sha }}
          path: build/Android/**/*.apk
          if-no-files-found: error
          retention-days: 30
