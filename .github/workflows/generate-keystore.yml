name: Generate Android Keystore

# Run this manually, once, whenever you need a new signing keystore.
# Alias and passwords are pulled from your existing repo secrets:
#   UNITY_KEY_ALIAS, UNITY_KEYSTORE_PASS, UNITY_KEY_PASS
# It uploads the keystore + base64 as a downloadable artifact.
# GitHub Actions can't write repo secrets from a workflow run, so
# you still copy the base64 output into UNITY_KEYSTORE_BASE64 by hand.

on:
  workflow_dispatch:
    inputs:
      validity_days:
        description: 'Validity period in days'
        required: true
        default: '10000'
      common_name:
        description: 'CN (e.g. your name or company)'
        required: true
        default: 'Unknown'
      organization:
        description: 'O (organization)'
        required: true
        default: 'Unknown'
      country_code:
        description: 'C (2-letter country code)'
        required: true
        default: 'US'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK (provides keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Load alias and passwords from secrets
        id: creds
        env:
          UNITY_KEY_ALIAS: ${{ secrets.UNITY_KEY_ALIAS }}
          UNITY_KEYSTORE_PASS: ${{ secrets.UNITY_KEYSTORE_PASS }}
          UNITY_KEY_PASS: ${{ secrets.UNITY_KEY_PASS }}
        run: |
          missing=0
          for name in UNITY_KEY_ALIAS UNITY_KEYSTORE_PASS UNITY_KEY_PASS; do
            if [ -z "${!name}" ]; then
              echo "ERROR: $name secret is not set. Add it in repo Settings -> Secrets -> Actions."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          echo "::add-mask::$UNITY_KEYSTORE_PASS"
          echo "::add-mask::$UNITY_KEY_PASS"
          echo "alias=$UNITY_KEY_ALIAS" >> "$GITHUB_OUTPUT"
          echo "store_pass=$UNITY_KEYSTORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$UNITY_KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Generate keystore with keytool
        run: |
          keytool -genkeypair \
            -v \
            -keystore user.keystore \
            -storetype PKCS12 \
            -alias "${{ steps.creds.outputs.alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity ${{ inputs.validity_days }} \
            -storepass "${{ steps.creds.outputs.store_pass }}" \
            -keypass "${{ steps.creds.outputs.key_pass }}" \
            -dname "CN=${{ inputs.common_name }}, O=${{ inputs.organization }}, C=${{ inputs.country_code }}"

      - name: Verify keystore is readable (sanity check before you trust it)
        run: |
          keytool -list -v \
            -keystore user.keystore \
            -storepass "${{ steps.creds.outputs.store_pass }}" \
            -alias "${{ steps.creds.outputs.alias }}"

      - name: Base64-encode keystore (no line wraps)
        run: |
          base64 -w 0 user.keystore > user.keystore.base64.txt
          # Sanity check: decode it back and diff against the original
          base64 -d user.keystore.base64.txt > roundtrip.keystore
          cmp user.keystore roundtrip.keystore && echo "Round-trip OK: base64 is clean"

      - name: Upload keystore + base64 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          # Short retention: this is sensitive, don't leave it sitting around
          retention-days: 1
          path: |
            user.keystore
            user.keystore.base64.txt

      - name: What to do next
        run: |
          echo "=================================================="
          echo " Alias and passwords already match your secrets:  "
          echo "   UNITY_KEY_ALIAS, UNITY_KEYSTORE_PASS, UNITY_KEY_PASS"
          echo " Only one thing left to update:                    "
          echo "=================================================="
          echo "1. Download the 'android-keystore' artifact from this run."
          echo "2. Open user.keystore.base64.txt and copy its exact contents."
          echo "3. Paste that into the UNITY_KEYSTORE_BASE64 repo secret,"
          echo "   overwriting whatever was there before."
          echo "4. Re-run your Unity build workflow."
